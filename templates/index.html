<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="/static/styles.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <title>Portfolio Analysis</title>
        <script>

            document.addEventListener("DOMContentLoaded", function () {
                // Retrieve the Data 
                const portfolio_risks = {{ portfolio_risks | tojson or [] }};
                const portfolio_returns = {{ portfolio_returns | tojson or [] }};
                const w1_array = {{ w1_array | tojson or [] }};
                const w2_array = {{ w2_array | tojson or [] }};

                // Transform the Data
                const chartData = portfolio_risks.map((risk, i) => ({
                    x: risk,
                    y: portfolio_returns[i]
                }));

                // Create the chart
                const ctx = document.getElementById('scatterplot').getContext('2d');
                new Chart(ctx, {
                    type: 'scatter',
                    data: {
                        datasets: [{
                            label: 'Efficient Frontier',
                            data: chartData,
                            backgroundColor: 'rgb(152, 180, 250)',
                        }]
                    },
                    options: {
                        scales: {
                            x: { title: { display: true, text: 'Standard Deviation' } },
                            y: { title: { display: true, text: 'Returns' } }
                        },
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: function (context) {
                                        const i = context.dataIndex;
                                        return [
                                            `Expected Return: ${(portfolio_returns[i] * 100).toFixed(2)}%`,
                                            `Std Dev: ${(portfolio_risks[i] * 100).toFixed(2)}%`,
                                            `Stock A: ${(w1_array[i] * 100).toFixed(0)}%`,
                                            `Stock B: ${(w2_array[i] * 100).toFixed(0)}%`
                                        ];
                                    }
                                }
                            }
                        }
                    }
                });
            });
        </script>
    </head>
    <body>
        <div class="header">
            <h1>Portfolio Analysis</h1>
        </div>
        <div class="container">
            <div class="stock-info-section">

                <h2>Stock information</h2>

                <div class="error_message">
                    {% if error_check == "error" %}
                        <p>{{ error_message }}</p>
                    {% endif %}
                </div>

                <form action="/" method="post" onsubmit="return validateForm()">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input autocomplete="off" name="er_a" placeholder="Expected return of stock A" value="{{ r1 }}" type="number" step="any">
                    <input autocomplete="off" name="er_b" placeholder="Expected return of stock B" value="{{ r2 }}" type="number" step="any">
                    <input autocomplete="off" name="std_a" placeholder="Standard deviation of stock A" value="{{ std1 }}" type="number" step="any">
                    <input autocomplete="off" name="std_b" placeholder="Standard deviation of stock B" value="{{ std2 }}" type="number" step="any">
                    <input autocomplete="off" name="c" placeholder="Correlation coefficient" value="{{ c }}" type="number" step="any">
                    <input autocomplete="off" name="rfr" placeholder="Risk-free rate" value="{{ rfr }}" type="number" step="any">
                    <button type="submit">Submit</button>
                </form>
            </div>

            <div class="section">

                <h2>Portfolio Efficient Frontier</h2>

                <canvas id="scatterplot" width="80" height="30"></canvas>
                <table>
                    <tr>
                        <th></th>
                        <th>Stock A Weighting</th>
                        <th>Stock B Weighting</th>
                    </tr>
                    <tr>
                        <td>Max Sharpe</td>
                        <td>{{ sharpe_w1 }}</td>
                        <td>{{ sharpe_w2 }}</td>
                    </tr>
                    <tr>
                        <td>Minimum Variance</td>
                        <td>{{ min_risk_w1 }}</td>
                        <td>{{ min_risk_w2 }}</td>
                    </tr>

                </table>

            </div>
        </div>
    </body>
</html>
